name: dermasmart
description: DermaSmart - AI-Powered Personalized Skincare Assistant
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.0.0
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  http: ^1.6.0
  shared_preferences: ^2.2.2  # ← BU SATIRI EKLE
  table_calendar: ^3.2.0
  flutter_native_splash: 2.4.4
  flutter_launcher_icons: ^0.14.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/DermaAppIcon.jpeg
    - assets/DermaSplash.jpeg

flutter_native_splash:
  color: "#2D1B69"
  background_image: assets/DermaSplash.jpeg
  android: true
  ios: true
  fullscreen: true
  
  android_12:
    color: "#2D1B69"
    background_image: assets/DermaSplash.jpeg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/DermaAppIcon.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "#2D1B69"
  adaptive_icon_foreground: "assets/DermaAppIcon.jpeg"